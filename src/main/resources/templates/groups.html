<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Circles</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/main.css}" rel="stylesheet">

    <style>
        /* ───────────── Groups Page Specific Styles ───────────── */
        .group-card {
            min-height: 280px;
            border-radius: 15px;
            padding: 20px;
            background: #fffdf6;
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
            transform: rotate(var(--rotation));
            transform-origin: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s ease;
            width: 260px;
        }

        .group-card:hover {
            transform: rotate(0deg) scale(1.05);
        }

        .group-card .badge {
            margin-top: 10px;
        }

        .group-card img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 2px solid #eee;
        }

        .group-card form {
            width: 100%;
        }

        .group-card form input {
            margin-bottom: 5px;
            text-align: center;
        }

        .groups-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <h1 class="text-center mb-3">Your Circles</h1>
    <p class="text-center text-muted mb-4">All the groups you’re part of</p>

    <div class="text-center mb-4">
        <a href="/groups/create" class="btn btn-primary">+ Create New Circle</a>
        <a href="/circles/join" class="btn btn-outline-secondary">Join via Invite Link</a>
    </div>

    <!-- No groups -->
    <div th:if="${#lists.isEmpty(groups)}" class="text-center mt-5">
        <p class="text-muted">You're not in any circles yet 💌</p>
    </div>

    <!-- Groups list -->
    <div th:if="${!#lists.isEmpty(groups)}" class="groups-row">

        <div class="group-card"
             th:each="group, iterStat : ${groups}"
             th:style="'--rotation:' + (${iterStat.index % 2 == 0} ? '-2deg' : '2deg')">

            <img src="/images/sad_slug.png" alt="Group">

            <h5 class="text-center" th:text="${group.name}">Group Name</h5>
            <span class="badge bg-secondary">Monthly Circle</span>

            <!-- Rename form -->
            <form th:action="@{/groups/{id}/update(id=${group.id})}" method="post" class="d-flex flex-column">
                <input type="text" name="name" placeholder="New name" class="form-control form-control-sm">
                <button type="submit" class="btn btn-outline-primary btn-sm mt-1">Rename</button>
            </form>

            <!-- Invite form -->
            <form th:action="@{/groups/{id}/invite(id=${group.id})}" method="post" class="d-flex flex-column mt-2">
                <input type="email" name="email" placeholder="Invite by email" class="form-control form-control-sm">
                <button type="submit" class="btn btn-outline-success btn-sm mt-1">Invite</button>
            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
