<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Groups Dashboard</title>
</head>
<body>
<h1>Your Groups</h1>

<!-- Create Group Form -->
<form action="#" th:action="@{/groups}" method="post">
    <input type="text" name="name" placeholder="Group name" required>
    <button type="submit">Create Group</button>
</form>

<!-- Existing Groups -->
<div th:if="${#lists.isEmpty(groups)}">
    <p>You don’t have any groups yet. Create one above!</p>
</div>

<div th:each="group : ${groups}">
    <p>
        <strong th:text="${group.name}"></strong>

        <!-- Rename form -->
    <form th:action="@{/groups/{id}/update(id=${group.id})}" method="post">
        <input type="text" name="name" placeholder="New name">
        <button type="submit">Rename</button>
    </form>

    <!-- Invite form -->
    <form th:action="@{/groups/{id}/invite(id=${group.id})}" method="post">
        <input type="email" name="email" placeholder="Invite by email">
        <button type="submit">Invite</button>
    </form>
    </p>
</div>
</body>
</html>
