<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${group.name} + ' Feed'">Group Feed</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/main.css}" rel="stylesheet">
</head>

<script th:inline="javascript">
    const unlockTime = new Date([[${unlockTime}]]);

    function updateCountdown() {
        const now = new Date();
        const diff = unlockTime - now;

        if (diff <= 0) {
            document.getElementById("countdown").innerText = "Unlocked!";
            location.reload();
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);

        document.getElementById("countdown").innerText =
            `${days}d ${hours}h ${minutes}m`;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
</script>
<body>
<div class="feed-container">
<!-- Navbar -->
    <div th:replace="fragments/navbar :: navbar"></div>
        <div class="group-header-wrapper">
            <div class="container" style="max-width: 700px;">
                <div class="group-header-card">
                    <div class="group-header-top">
                        <div class="home-card-illustration">
                            <div class="home-card-icon">✧</div>
                        </div>

                    <!-- Month of current issue-->
                        <div class="header-pill" th:text="${monthName} + ' issue'">
                        </div>

                        <div class="header-pill">
                            <span th:if="${group.members != null and #lists.size(group.members) > 0}">
                                <button type="button" class="btn btn-outline-secondary btn-sm"
                                        data-bs-toggle="modal"
                                        data-bs-target="#membersModal">
                                    <span th:text="${#lists.size(group.members)}"></span>
                                    <span th:text="${#lists.size(group.members) == 1} ? 'member' : 'members'"></span>
                                </button>
                            </span>
                            <span th:if="${group.members == null or #lists.isEmpty(group.members)}">
                            No members yet
                            </span>
                        </div>
                    </div>
                    <!-- Group name -->
                    <h1 class="fw-bold mb-2" th:text="${group.name}">Group Name</h1>

                </div>
            </div>
        </div>

<div class="container mt-5" style="max-width: 700px;">
    <div class="feed-content" th:classappend="${feedLocked} ? 'locked'">

    <!-- Newsletter: prompts and responses -->
    <div th:if="${#maps.isEmpty(newsletter)}" class="text-center text-muted mt-5">
        <p>No responses yet 💌</p>
    </div>

    <div th:each="entry, iterStat : ${newsletter}"
         class="feed-card mb-4"
         th:classappend="
        ${iterStat.index == 0 ? ' card-tilt-1 tape-top-left tape-bottom-right' :
        iterStat.index == 1 ? ' card-tilt-2 tape-bottom-left ':
        iterStat.index == 2 ? ' card-tilt-3 ' :
        iterStat.index == 3 ? ' card-tilt-4 tape-bottom-left tape-top-right' :
        ''}">

                <!-- Prompt -->
                <h5 th:text="${entry.key.prompt}">Example Prompt</h5>

                <!-- Responses -->
                <div th:each="response : ${entry.value}" class="mb-2 p-2 rounded" style="background:#f9f6ef;">
                    <strong th:text="${response.userName}">User</strong>
                    <p class="mb-0" th:text="${response.responseText}">Response</p>
                    <img th:if="${response.imageUrl != null}"
                         th:src="${response.imageUrl}"
                         alt="Response image"
                         class="img-fluid rounded mt-2"
                         style="max-height: 300px; object-fit: cover; cursor: pointer;"
                         data-bs-toggle="modal"
                         data-bs-target="#imageModal"
                         th:attr="data-src=${response.imageUrl}"
                         onclick="document.getElementById('modalImage').src = this.dataset.src">
                </div>
        </div>
    </div>

    <div class="feed-info-card text-center mx-auto">

        <div class="feed-info-doodle feed-info-doodle-heart">♡</div>
        <div class="feed-info-doodle feed-info-doodle-star">✧</div>

        <div class="feed-info-inner">

            <h5 class="feed-info-title">That’s a wrap</h5>

            <p class="feed-info-text">
                <span th:text="'A little snapshot of ' + ${group.name} + '\'s month 💌'"></span>
            </p>

            <div class="feed-info-actions">
            <span class="feed-step-pill feed-step-pill-blue">
                <span class="feed-step-icon">✉</span>
                <span>Next prompts soon</span>
            </span>

                <span class="feed-step-pill feed-step-pill-peach">
                <span class="feed-step-icon">✎</span>
                <span>Write again</span>
            </span>

                <span class="feed-step-pill feed-step-pill-pink">
                <span class="feed-step-icon">☰</span>
                <span>New issue next month</span>
            </span>

                <span class="feed-step-pill feed-step-pill-peach">
                <span class="feed-step-icon">💔</span>
                <span>Leave group</span>
            </span>
            </div>

        </div>
    </div>
</div>
    <div class="overlay" th:if="${feedLocked}">
        <div class="overlay-content">
            <h2>🔒 Feed Locked</h2>
            <p>Unlocks in:</p>
            <p id="countdown"></p>
        </div>
    </div>
    <div class="modal fade" id="imageModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 70vw;">
            <div class="modal-content bg-transparent border-0">
                <div class="modal-body text-center p-0">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-2" data-bs-dismiss="modal"></button>
                    <img id="modalImage" src="" alt="Full size image" class="rounded d-block mx-auto" style="width: 50vw; height: 50vh; object-fit: fill;">
                </div>
            </div>
        </div>
    </div>
<!-- Members Modal -->
<div class="modal fade" id="membersModal" tabindex="-1" aria-labelledby="membersModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="membersModalLabel">Group Members</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <ul class="list-group">
                    <li th:each="membership : ${group.members}" class="list-group-item"
                        th:text="${membership.user.name}">Member Name</li>
                </ul>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
