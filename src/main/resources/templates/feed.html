<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${group.name} + ' Feed'">Group Feed</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/main.css}" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5" style="max-width: 700px;">

    <!-- Group name -->
    <h1 class="fw-bold mb-2" th:text="${group.name}">Group Name</h1>

    <!-- Members -->
    <p class="text-muted mb-4">
        <span th:if="${group.members != null}" th:each="membership : ${group.members}"
              class="badge bg-light text-dark me-1"
              th:text="${membership.user.name}">Member</span>
        <span th:if="${group.members == null}">No members yet</span>
    </p>

    <!-- Newsletter: prompts and responses -->
    <div th:if="${#maps.isEmpty(newsletter)}" class="text-center text-muted mt-5">
        <p>No responses yet 💌</p>
    </div>

    <div th:each="entry, iterStat : ${newsletter}" class="mb-4">
        <div class="feed-card
        [[${iterStat.index == 0} ? 'card-tilt-1 tape-top-left tape-bottom-right' : '']]
        [[${iterStat.index == 1} ? 'card-tilt-2' : '']]">

            <!-- Prompt -->
            <h5 th:text="${entry.key.prompt}">Example Prompt</h5>

            <!-- Responses -->
            <div th:each="response : ${entry.value}"
                 class="mb-3 p-3 rounded"
                 style="background:#f9f6ef;">

                <!-- user -->
                <strong th:text="${response.userId}">User</strong>

                <!-- response text -->
                <p class="mb-3" th:text="${response.responseText}">Response</p>

                <!-- reactions footer -->
                <div class="pt-2 border-top"
                     style="border-color: rgba(0,0,0,0.08) !important;">

                    <div class="d-flex align-items-center gap-2 flex-wrap">

                        <!-- heart -->
                        <form th:action="@{/feed/{groupId}/responses/{responseId}/react(groupId=${group.id}, responseId=${response.id})}"
                              method="post"
                              style="display:inline;">
                            <input type="hidden" name="emoji" value="❤️" />
                            <button type="submit"
                                    class="btn btn-sm border-0 px-2 py-1 shadow-none d-flex align-items-center gap-1 rounded"
                                    th:classappend="${userReactionByResponse[response.id] == '❤️'}
                        ? ' bg-light text-dark fw-semibold'
                        : ' bg-transparent text-secondary'">
                                <span>❤️</span>
                                <span class="text-dark"
                                      th:if="${reactionCountsByResponse[response.id]['❤️'] > 0}"
                                      th:text="${reactionCountsByResponse[response.id]['❤️']}">1</span>
                            </button>
                        </form>

                        <!-- laugh -->
                        <form th:action="@{/feed/{groupId}/responses/{responseId}/react(groupId=${group.id}, responseId=${response.id})}"
                              method="post"
                              style="display:inline;">
                            <input type="hidden" name="emoji" value="😂" />
                            <button type="submit"
                                    class="btn btn-sm border-0 px-2 py-1 shadow-none d-flex align-items-center gap-1 rounded"
                                    th:classappend="${userReactionByResponse[response.id] == '😂'}
                        ? ' bg-light text-dark fw-semibold'
                        : ' bg-transparent text-secondary'">
                                <span>😂</span>
                                <span class="text-dark"
                                      th:if="${reactionCountsByResponse[response.id]['😂'] > 0}"
                                      th:text="${reactionCountsByResponse[response.id]['😂']}">1</span>
                            </button>
                        </form>

                        <!-- thumbs up -->
                        <form th:action="@{/feed/{groupId}/responses/{responseId}/react(groupId=${group.id}, responseId=${response.id})}"
                              method="post"
                              style="display:inline;">
                            <input type="hidden" name="emoji" value="👍" />
                            <button type="submit"
                                    class="btn btn-sm border-0 px-2 py-1 shadow-none d-flex align-items-center gap-1 rounded"
                                    th:classappend="${userReactionByResponse[response.id] == '👍'}
                        ? ' bg-light text-dark fw-semibold'
                        : ' bg-transparent text-secondary'">
                                <span>👍</span>
                                <span class="text-dark"
                                      th:if="${reactionCountsByResponse[response.id]['👍'] > 0}"
                                      th:text="${reactionCountsByResponse[response.id]['👍']}">1</span>
                            </button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="feed-info-card text-center mx-auto">

        <div class="feed-info-doodle feed-info-doodle-heart">♡</div>
        <div class="feed-info-doodle feed-info-doodle-star">✧</div>

        <div class="feed-info-inner">

            <h5 class="feed-info-title">That’s a wrap</h5>

            <p class="feed-info-text">
                <span th:text="'A little snapshot of ' + ${group.name} + '\'s month 💌'"></span>
            </p>

            <div class="feed-info-actions">
            <span class="feed-step-pill feed-step-pill-blue">
                <span class="feed-step-icon">✉</span>
                <span>Next prompts soon</span>
            </span>

                <span class="feed-step-pill feed-step-pill-peach">
                <span class="feed-step-icon">✎</span>
                <span>Write again</span>
            </span>

                <span class="feed-step-pill feed-step-pill-pink">
                <span class="feed-step-icon">☰</span>
                <span>New issue next month</span>
            </span>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
