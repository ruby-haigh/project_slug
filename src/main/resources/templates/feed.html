<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${group.name} + ' Feed'">Group Feed</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/main.css}" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5" style="max-width: 700px;">

    <!-- Group name -->
    <h1 class="fw-bold mb-2" th:text="${group.name}">Group Name</h1>

    <!-- Members -->
    <p class="text-muted mb-4">
        <span th:if="${group.members != null}" th:each="membership : ${group.members}"
              class="badge bg-light text-dark me-1"
              th:text="${membership.user.name}">Member</span>
        <span th:if="${group.members == null}">No members yet</span>
    </p>

    <!-- Newsletter: prompts and responses -->
    <div th:if="${#maps.isEmpty(newsletter)}" class="text-center text-muted mt-5">
        <p>No responses yet 💌</p>
    </div>

    <div th:each="entry, iterStat : ${newsletter}" class="mb-4">
        <div class="feed-card
        [[${iterStat.index == 0} ? 'card-tilt-1 tape-top-left tape-bottom-right' : '']]
        [[${iterStat.index == 1} ? 'card-tilt-2' : '']]">

                <!-- Prompt -->
                <h5 th:text="${entry.key.prompt}">Example Prompt</h5>

                <!-- Responses -->
                <div th:each="response : ${entry.value}" class="mb-2 p-2 rounded" style="background:#f9f6ef;">
                    <strong th:text="${response.userId}">User</strong> <!-- replace with name if you fetch user -->
                    <p class="mb-0" th:text="${response.responseText}">Response</p>
                </div>
        </div>
    </div>


    <div class="feed-info-card text-center mx-auto">

        <div class="feed-info-doodle feed-info-doodle-heart">♡</div>
        <div class="feed-info-doodle feed-info-doodle-star">✧</div>

        <div class="feed-info-inner">

            <h5 class="feed-info-title">That’s a wrap</h5>

            <p class="feed-info-text">
                <span th:text="'A little snapshot of ' + ${group.name} + '\'s month 💌'"></span>
            </p>

            <div class="feed-info-actions">
            <span class="feed-step-pill feed-step-pill-blue">
                <span class="feed-step-icon">✉</span>
                <span>Next prompts soon</span>
            </span>

                <span class="feed-step-pill feed-step-pill-peach">
                <span class="feed-step-icon">✎</span>
                <span>Write again</span>
            </span>

                <span class="feed-step-pill feed-step-pill-pink">
                <span class="feed-step-icon">☰</span>
                <span>New issue next month</span>
            </span>

                <span class="feed-step-pill feed-step-pill-peach">
                <span class="feed-step-icon">💔</span>
                <span>Leave group</span>
            </span>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
