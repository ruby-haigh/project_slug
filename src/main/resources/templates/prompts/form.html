<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Prompt Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/main.css}" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container scrapbook-shell mt-5">
    <h1 class="text-center scrapbook-title" th:text="'Prompt form for ' + ${group.name}">Prompt form</h1>
    <p class="text-center scrapbook-subtitle">It’s time for your monthly update</p>

    <div class="scrapbook-grid">
        <div class="circle-card scrapbook-card scrapbook-card-blue card-tilt-right">
            <div class="scrapbook-card-body">
                <div class="scrapbook-illustration">
                    <div class="scrapbook-icon">✎</div>
                </div>

                <h5 class="scrapbook-card-title">Monthly update</h5>

                <div th:if="${alreadySubmitted}" class="w-100 text-center">
                    <div class="scrapbook-message scrapbook-message-success">
                        You’ve already submitted your update for this cycle.
                    </div>
                    <p class="scrapbook-card-meta">You’re all set for this month.</p>
                    <div class="text-center mt-4">
                        <a th:href="@{/groups}" class="scrapbook-link">
                            <span>←</span>
                            <span>Back to Circles</span>
                        </a>
                    </div>
                </div>

                <div th:unless="${alreadySubmitted}" class="w-100">
                    <p class="scrapbook-card-meta mb-4">Answer the prompts below and your responses will be saved to this cycle.</p>

                    <form th:action="@{/groups/{groupId}/prompts(groupId=${groupId})}" method="post" class="scrapbook-form">
                        <input type="hidden" name="groupCycleId" th:value="${groupCycleId}" />

                        <div th:each="prompt, iterStat : ${prompts}" class="mb-4">
                            <label class="scrapbook-label" th:for="'response-' + ${iterStat.index}" th:text="${prompt.prompt}">
                                Prompt text goes here
                            </label>
                            <input type="hidden" name="promptIds" th:value="${prompt.id}" />
                            <textarea
                                    th:id="'response-' + ${iterStat.index}"
                                    name="responseTexts"
                                    class="scrapbook-input scrapbook-textarea"
                                    placeholder="Type your answer here"></textarea>
                        </div>

                        <button type="submit" class="scrapbook-pill scrapbook-pill-peach scrapbook-button mt-3">
                            ✦ Submit responses
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <a th:href="@{/groups}" class="scrapbook-link">
                            <span>←</span>
                            <span>Back to Circles</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
