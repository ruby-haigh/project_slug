<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Up Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/main.css}" rel="stylesheet">
    <link rel="icon" type="image/png" href="/images/favicon.png">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5 account-shell" style="max-width: 620px;">

    <div class="account-heading mb-4">
        <span class="account-kicker">Welcome</span>
        <h2 class="fw-bold mb-1">Finish setting up your account</h2>
        <p class="text-muted mb-0">We just need a few details before you can carry on.</p>
    </div>

    <div class="card border-0 shadow-sm mb-4 account-card">
        <div class="card-body px-4 py-4">
            <h6 class="text-uppercase text-muted fw-semibold small mb-3">Required Details</h6>

            <form th:action="@{/users/setup}" th:object="${user}" method="post">
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Name</label>
                    <input type="text" class="form-control" th:field="*{name}" placeholder="Your name" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Date of Birth</label>
                    <input type="date" class="form-control" th:field="*{dateOfBirth}" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Phone Number</label>
                    <input type="tel" class="form-control" th:field="*{phoneNumber}" placeholder="Your phone number" required/>
                </div>
                <button type="submit" class="btn btn-primary btn-sm">Save and continue</button>
            </form>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
