<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Account</title>
</head>
<body lang="en">
    <h3 th:text="'Account page: ' + ${user.getEmail()}"></h3>
    <p th:text="${user.getName()}"></p>
    <p th:text="${user.getBio()}"></p>
    <a th:href="'/users/' + ${user.getId()} + '/edit'"><button>Edit Account</button></a>

    <a href="/"><button>Back</button></a>
</body>
</html>
