<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/main.css}" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5" style="max-width: 620px;">

    <h2 class="fw-bold mb-1">My Account</h2>
    <p class="text-muted mb-4" th:text="${user.email}"></p>

    <!--profile info -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body px-4 py-3">
            <h6 class="text-uppercase text-muted fw-semibold small mb-3">Profile</h6>

            <div th:if="${user.profilePictureUrl != null}" class="mb-3 text-center">
                <img th:src="${user.profilePictureUrl}" alt="Profile picture"
                     class="rounded-circle" style="width: 80px; height: 80px; object-fit: cover;">
            </div>

            <div class="mb-2">
                <span class="text-muted small">Name</span>
                <p class="fw-semibold mb-0" th:text="${user.name} ?: 'Not set'"></p>
            </div>
            <div class="mb-2">
                <span class="text-muted small">Bio</span>
                <p class="fw-semibold mb-0" th:text="${user.bio} ?: 'Not set'"></p>
            </div>

            <a th:href="@{/users/{id}/edit(id=${user.id})}" class="btn btn-primary btn-sm mt-2">Edit Profile</a>
        </div>
    </div>

    <!--profile pic -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body px-4 py-3">
            <h6 class="text-uppercase text-muted fw-semibold small mb-3">Profile Picture</h6>
            <form action="/users/profile-picture" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <input type="file" name="file" accept="image/*" class="form-control">
                </div>
                <button type="submit" class="btn btn-primary btn-sm">Upload Photo</button>
            </form>
        </div>
    </div>

    <a href="/" class="btn btn-outline-secondary btn-sm">Back to Home</a>

</div>

<div th:replace="fragments/modals :: modals"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
