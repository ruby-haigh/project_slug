<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/main.css}" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5 account-shell account-profile-shell" style="max-width: 1080px;">

    <div class="account-hero mb-5">
        <div class="account-hero-avatar-wrap">
            <div class="account-hero-sparkle account-hero-sparkle-left">✧</div>
            <div class="account-hero-sparkle account-hero-sparkle-right">✦</div>
            <div class="account-hero-heart">♡</div>
            <label for="profilePicInput" class="account-hero-avatar-label">
                <img th:src="${user.profilePictureUrl} ?: 'https://ui-avatars.com/api/?name=' + ${user.email?.substring(0,1)} + '&background=' + ${user.avatarColour} + '&color=666&rounded=true&size=180'"
                     alt="Profile picture"
                     class="rounded-circle account-hero-avatar"
                     style="width: 180px; height: 180px; object-fit: cover;">
                <div class="account-hero-camera" th:if="${isOwnProfile}">
                    <i class="bi bi-camera-fill text-white" style="font-size: 13px;"></i>
                </div>
            </label>
            <form id="profilePicForm" action="/users/profile-picture" method="post" enctype="multipart/form-data" th:if="${isOwnProfile}">
                <input type="file" id="profilePicInput" name="file" accept="image/*" style="display: none;"
                       onchange="document.getElementById('profilePicForm').submit()">
            </form>
        </div>

        <div class="account-hero-copy">
            <span class="account-kicker">Profile</span>
            <h1 class="account-hero-title mb-2" th:if="${isOwnProfile}">Your Profile</h1>
            <h1 class="account-hero-title mb-2" th:unless="${isOwnProfile}" th:text="|${user.name}'s Profile|">Their Profile</h1>
            <div class="account-hero-underline"></div>
            <p id="user-email" class="text-muted mb-0 mt-3" th:if="${isOwnProfile}" th:text="${user.email}"></p>
            <p id="user-email" class="text-muted mb-0 mt-3" th:unless="${isOwnProfile}">A little snapshot of their Snail Mail life</p>
        </div>
    </div>

    <div class="account-stats-row mb-4">
        <div class="account-stat-card account-stat-card-green">
            <div class="account-stat-icon account-stat-icon-green">◎</div>
            <div class="account-stat-number" th:text="${profileStats.circleCount}">0</div>
            <div class="account-stat-label">Circles</div>
        </div>
        <div class="account-stat-card account-stat-card-peach">
            <div class="account-stat-icon account-stat-icon-peach">✎</div>
            <div class="account-stat-number" th:text="${profileStats.updateCount}">0</div>
            <div class="account-stat-label">Updates</div>
        </div>
        <div class="account-stat-card account-stat-card-pink">
            <div class="account-stat-icon account-stat-icon-pink">🔥</div>
            <div class="account-stat-number" th:text="${profileStats.streakCount}">0</div>
            <div class="account-stat-label">Month streak</div>
        </div>
    </div>

    <!--profile info -->
    <div class="card border-0 shadow-sm mb-4 account-card account-profile-card">
        <div class="card-body px-4 py-4">
            <h6 class="text-uppercase text-muted fw-semibold small mb-3">Profile</h6>

            <div class="account-detail-row">
                <span class="text-muted small">Name</span>
                <p class="fw-semibold mb-0" th:text="${user.name} ?: 'Not set'"></p>
            </div>
            <div class="account-detail-row" th:if="${isOwnProfile}">
                <span class="text-muted small">Date of Birth</span>
                <p class="fw-semibold mb-0"
                   th:text="${user.dateOfBirth != null ? #temporals.format(user.dateOfBirth, 'd MMMM yyyy') : 'Not set'}"></p>
            </div>
            <div class="account-detail-row" th:if="${isOwnProfile}">
                <span class="text-muted small">Phone Number</span>
                <p class="fw-semibold mb-0" th:text="${user.phoneNumber} ?: 'Not set'"></p>
            </div>
            <div class="account-detail-row">
                <span class="text-muted small">Bio</span>
                <p class="fw-semibold mb-0" th:text="${user.bio} ?: 'Not set'"></p>
            </div>

            <a th:if="${isOwnProfile}" th:href="@{/users/{id}/edit(id=${user.id})}" class="btn btn-primary btn-sm mt-3">Edit Profile</a>
        </div>
    </div>


    <a href="/" class="btn btn-outline-secondary btn-sm">Back to Home</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
