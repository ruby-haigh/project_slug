<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/main.css}" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5" style="max-width: 620px;">

    <h2 class="fw-bold mb-1">Edit Account</h2>
    <p class="text-muted mb-4">Update your profile details</p>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body px-4 py-3">
            <h6 class="text-uppercase text-muted fw-semibold small mb-3">Profile Details</h6>

            <form th:action="@{/users/{id}/edit(id=${user.id})}" th:object="${user}" method="post">
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Name</label>
                    <input type="text" class="form-control" th:field="*{name}" placeholder="Your name"/>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Bio</label>
                    <textarea class="form-control" th:field="*{bio}" rows="3" placeholder="Tell people about yourself..."></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary btn-sm">Save Changes</button>
                    <a th:href="@{/users/{id}(id=${user.id})}" class="btn btn-outline-secondary btn-sm">Cancel</a>
                </div>
            </form>

        </div>
    </div>

</div>

<div th:replace="fragments/modals :: modals"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
