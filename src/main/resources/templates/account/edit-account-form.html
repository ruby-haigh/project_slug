<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/main.css}" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5 account-shell" style="max-width: 620px;">

    <div class="account-heading mb-4">
        <span class="account-kicker">Profile</span>
        <h2 class="fw-bold mb-1">Edit Account</h2>
        <p class="text-muted mb-0">Update your profile details</p>
    </div>

    <div class="card border-0 shadow-sm mb-4 account-card">
        <div class="card-body px-4 py-4">
            <h6 class="text-uppercase text-muted fw-semibold small mb-3">Profile Details</h6>

            <form th:action="@{/users/{id}/edit(id=${user.id})}" th:object="${user}" method="post">
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Name</label>
                    <input type="text" class="form-control" th:field="*{name}" placeholder="Your name"/>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Date of Birth</label>
                    <input type="date" class="form-control" th:field="*{dateOfBirth}"/>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Phone Number</label>
                    <input type="tel" class="form-control" th:field="*{phoneNumber}" placeholder="Your phone number"/>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Bio</label>
                    <textarea class="form-control" th:field="*{bio}" rows="3" placeholder="Tell people about yourself..."></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary btn-sm">Save Changes</button>
                    <a th:href="@{/users/{id}(id=${user.id})}" class="btn btn-outline-secondary btn-sm">Cancel</a>
                </div>
            </form>

        </div>
    </div>
    <!-- delete account -->
    <div class="card border-danger shadow-sm mb-4">
        <div class="card-body px-4 py-3">
            <h6 class="text-uppercase text-danger fw-semibold small mb-3">Danger Zone</h6>
            <p class="mb-3 text-muted">
                Deleting your profile will remove you from all circles and log you out.
            </p>

            <!-- trigger button -->
            <button type="button" class="btn btn-danger btn-sm"
                    data-bs-toggle="modal"
                    data-bs-target="#deleteConfirmModal">
                Delete Profile
            </button>

            <!-- modal -->
            <div class="modal fade" id="deleteConfirmModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">

                        <div class="modal-header">
                            <h5 class="modal-title text-danger">Delete Profile</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <div class="modal-body">
                            <p class="mb-0">
                                Are you sure you want to delete your profile?
                                <br><br>
                                This will remove you from all circles and cannot be undone.
                            </p>
                        </div>

                        <div class="modal-footer">
                            <button type="button"
                                    class="btn btn-outline-secondary btn-sm"
                                    data-bs-dismiss="modal">
                                Cancel
                            </button>

                            <!-- form that submits -->
                            <form th:action="@{/users/{id}/delete(id=${user.id})}" method="post">
                                <button type="submit" class="btn btn-danger btn-sm">
                                    Yes, delete
                                </button>
                            </form>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
