<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Circle</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/main.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container scrapbook-shell mt-5">
    <h1 class="text-center scrapbook-title">Create a New Circle</h1>
    <p class="text-center scrapbook-subtitle">Start a circle to share monthly moments with your friends</p>

    <div class="scrapbook-grid">
        <div class="circle-card scrapbook-card scrapbook-card-green card-tilt-left">
            <div class="scrapbook-card-body">
                <div class="scrapbook-illustration">
                    <div class="scrapbook-icon">✧</div>
                </div>

                <h5 class="scrapbook-card-title">Your New Circle</h5>
                <p class="scrapbook-card-meta">something lovely to build together</p>

                <div class="mb-3">
                    <span class="scrapbook-pill scrapbook-pill-green">✦ Start a monthly circle</span>
                </div>

                <form th:action="@{/groups/create}" method="post" class="scrapbook-form mt-2">
                    <label class="scrapbook-label" for="circle-name">Circle name</label>
                    <input id="circle-name" type="text" name="name" placeholder="Family, Uni Friends, Book Club..." class="scrapbook-input" required>
                    <button type="submit" class="scrapbook-pill scrapbook-pill-peach scrapbook-button mt-3">＋ Create Circle</button>
                </form>

                <div class="text-center mt-4">
                    <a th:href="@{/groups}" class="scrapbook-link">
                        <span>←</span>
                        <span>Back to Dashboard</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/modals :: modals"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
