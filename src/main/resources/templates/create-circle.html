<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Circle</title>
</head>
<body>
<h1>Create a New Circle</h1>

<form th:action="@{/groups/create}" method="post">
    <input type="text" name="name" placeholder="Circle name" required>
    <button type="submit">Create Circle</button>
</form>

<p><a th:href="@{/groups}">Back to Dashboard</a></p>
</body>
</html>
